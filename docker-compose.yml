services:
  
  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: ${POSTGRESQL_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRES_DB: ${POSTGRESQL_DATABASE}
    ports:
    - ${POSTGRESQL_PORT}:5432
    volumes:
    - ./data/postgresql:/var/lib/postgresql/data/
    networks:
      cloudvault_network
  
  backend: 
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: vault_backend
    restart: always
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      - PostgreUser=${PostgreUser}
      - PostgrePassword=${PostgrePassword}
      - PostgreDB=${PostgreDB}
      - PostgrePort=5432
      - PostgreHost=${PostgreHost}
    depends_on:
      - database
    networks:
      - cloudvault_network
  
  frontend:
    build:
      context: ./fontend
      dockerfile: dockerfile
    container_name: vault_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:5030"
    volumes:
      - ./frontend:/app:rw
    environment:
      VITE_API_URL:${VITE_API_URL}
    depends_on:
      - vault_backend
    networks:
      - cloudvault_network


network: 
  cloudvault_network: